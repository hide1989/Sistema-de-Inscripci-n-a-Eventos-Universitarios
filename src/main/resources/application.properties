spring.application.name=inscripcion-eventos

# ── H2 in-memory ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:inscripciones;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
# Solo WARN en general; INFO habilitado para auditoría y arranque del sistema
logging.level.root=WARN
logging.level.com.example=INFO
logging.level.com.example.infrastructure.messaging=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
